<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crowd Heatmap{% endblock %}</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface: rgba(31, 40, 51, 0.65);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a8b2d1;
            --accent: #66fcf1;
            --accent-hover: #45a29e;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
            margin: 0;
        }

        /* Dynamic Background Orbs (Restricted mostly to the left side) */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }

        .bg-orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #0f3460, transparent 70%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #45a29e40, transparent 70%);
            bottom: -100px;
            left: 20%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, 50px) scale(1.1);
            }

            100% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* Split Layout Container */
        .split-layout {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .auth-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
        }

        .auth-right {
            flex: 1;
            overflow-y: auto;
        }
        
        .right-inner-wrapper {
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 991px) {
            .split-layout {
                flex-direction: column;
                overflow: auto;
                height: auto;
                min-height: 100vh;
            }

            .auth-left {
                padding: 3rem 2rem 1rem;
                text-align: center;
                flex: none;
            }

            .auth-right {
                flex: none;
                overflow-y: visible;
            }
            .right-inner-wrapper {
                align-items: flex-start;
                padding-top: 1rem;
            }
        }

        .auth-card-wrapper {
            width: 100%;
            max-width: 440px;
            z-index: 10;
        }

        /* Glassmorphism Card styling maintained for consistency */
        .card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: var(--text-main);
            overflow: hidden;
            animation: fadeUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Styling overrides for Auth */
        a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--text-main);
            text-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .brand-title {
            font-weight: 700;
            font-size: 3.5rem;
            line-height: 1.1;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 20%, #66fcf1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .brand-subtitle {
            font-size: 1.25rem;
            font-weight: 300;
            line-height: 1.6;
            max-width: 450px;
            color: var(--text-muted);
        }

        @media (max-width: 991px) {
            .brand-title {
                font-size: 2.5rem;
            }

            .brand-subtitle {
                margin: 0 auto;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="split-layout">
        <!-- Left Side: Branding / Messaging -->
        <div class="auth-left">
            <a href="{% if user.is_authenticated %}{% url 'home' %}{% else %}{% url 'login' %}{% endif %}"
                class="text-decoration-none">
                <h1 class="brand-title">Business Intelligence<br>Crowd Heatmap</h1>
                <p class="brand-subtitle">Discover the absolute best location for your business using intelligent
                    analytics.</p>
            </a>
        </div>

        <!-- Right Side: Interaction / Login Card -->
        <div class="auth-right">
            <div class="right-inner-wrapper">
                <div class="auth-card-wrapper">
                    {% block auth_content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
